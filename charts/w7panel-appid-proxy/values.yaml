replicaCount: 1

image:
  repository: zpk.w7.cc/public/w7panel-app-proxy
  pullPolicy: IfNotPresent
  tag: v1.0.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

containerPort: 8000
panelNamespace: ""

env:
  APP_ENV: release
  SERVER_PORT: "8000"
  PANEL_CREDENTIAL_CACHE_SECONDS: "300"
  API_PROXY_SCHEME: https
  API_PROXY_ALLOWED_HOST: api.w7.cc

extraEnv: []

dnsPolicy: None
dnsConfig:
  nameservers:
    - 114.114.114.114
    - 223.5.5.5
  options:
    - name: ndots
      value: "1"

resources: {}

livenessProbe:
  httpGet:
    path: /api/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
